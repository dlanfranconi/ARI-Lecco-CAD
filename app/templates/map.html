{% extends "base.html" %}
{% block head %}<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">{% endblock %}
{% block content %}
<section class="panel">
  <div class="section-title">
    <h1>{{ t.aprs_map }}</h1>
    {% if is_admin %}<form method="post" action="/aprs/poll"><button class="secondary">{{ t.poll_now }}</button></form>{% endif %}
  </div>
  {% if not aprs_enabled %}<p class="warning">{{ t.aprs_key_missing }}</p>{% endif %}
  <div id="map"></div>
</section>
<section class="panel">
  <h2>{{ t.latest_positions }}</h2>
  <div id="position-list" class="cards"></div>
</section>
{% endblock %}
{% block scripts %}<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="/static/map.js"></script>{% endblock %}
