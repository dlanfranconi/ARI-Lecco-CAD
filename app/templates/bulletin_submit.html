{% extends "base.html" %}
{% block content %}
<section class="login">
  <form method="post" action="/bulletin-submit" class="panel narrow">
    <h1>{{ t.submit_bulletin }}</h1>
    {% if request.query_params.get("sent") %}<p class="success">{{ t.sent_to_dispatch }}</p>{% endif %}
    <label>{{ t.your_name }}<input name="submitter_name"></label>
    <label>{{ t.bulletin_message }}<textarea name="message" rows="6" required></textarea></label>
    <button>{{ t.send_bulletin }}</button>
  </form>
</section>
{% endblock %}
