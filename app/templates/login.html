{% extends "base.html" %}
{% block title %}Login - ARI Lecco CAD{% endblock %}
{% block content %}
<section class="login">
  <form method="post" action="/login" class="panel narrow">
    <h1>Dispatch Login</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label>Username<input name="username" autofocus required></label>
    <label>Password<input name="password" type="password" required></label>
    <button>Login</button>
  </form>
</section>
{% endblock %}
