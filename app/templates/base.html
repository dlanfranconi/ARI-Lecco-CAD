<!doctype html>
<html lang="{{ lang|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ t.app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  {% block head %}{% endblock %}
</head>
<body>
  {% if dispatch_user %}
  <header class="topbar">
    <a class="brand" href="/">{{ t.app_title }}</a>
    <nav>
      <a href="/">{{ t.dispatch_log }}</a>
      <a href="/map">{{ t.aprs_map }}</a>
      <a href="/bulletins">{{ t.bulletins }}</a>
      <a href="/setup">{{ t.setup }}</a>
      <a href="/announcer" target="_blank">{{ t.announcer }}</a>
    </nav>
    <form method="post" action="/logout"><button class="ghost">{{ t.logout }}</button></form>
  </header>
  {% endif %}
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
