services:
  cad:
    build: .
    container_name: ari-lecco-cad
    restart: unless-stopped
    environment:
      CAD_ADMIN_USERNAME: ${CAD_ADMIN_USERNAME:-dispatch}
      CAD_ADMIN_PASSWORD: ${CAD_ADMIN_PASSWORD:-dispatch}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-string}
      APRSFI_API_KEY: ${APRSFI_API_KEY:-}
      APRS_POLL_SECONDS: ${APRS_POLL_SECONDS:-60}
      DATABASE_PATH: /data/cad.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
